# G2P multi-task training configuration

# --- data ---
data_dir: data/Korean
output_dir: checkpoints
model_name: Korean             # run artifacts saved under checkpoints/{model_name}
# Language definitions: each entry selects dataset-{id}.csv and flags whether the
# language is CJK-like (one character == one independent syllable).  For such
# languages the phoneme groups are constrained to contain exactly one vowel
# nucleus, which fixes the separators the count heads under-fit.
# (Supersedes the legacy `file_glob`.)
lang_define:
  - id: ko
    syllable_is_char: true
# vowel_phonemes: null          # optional {lang: [phoneme, ...]} explicit override;
                                  # when null, vowels are derived from data by confidence
# syllable_constraint_weight: 0.5  # > 0 enables the one-vowel-per-syllable violation
                                   # diagnostic (logged to TensorBoard); the actual
                                   # separator fix is applied at inference regardless.
phoneme_set: null              # optional path to a file with one phoneme per line
max_src_len: 120
max_tgt_len: 120
val_split: 0.05
seed: 42
# binarize: preprocess CSVs into compact mmap-able numpy binaries under
# {data_dir}/binary so training streams rows from disk (no host-RAM spike).
# auto-binarize runs (with binarize_workers threads) before training, only
# when the binaries are missing or stale; training itself uses num_workers=0.
binarize: true
binarize_workers: 8
binary_dir: null   # null -> {data_dir}/binary

# --- vocabulary / subword ---
bpe_merges: 3000               # BPE merge operations for the grapheme vocab
min_freq: 1
max_samples: null              # cap rows read per dataset (null = use the whole file)

# --- model ---
# Kept compact on purpose: each decoder output projection shares weights with
# its input embedding (weight tying, see src/model.py), so the effective
# parameter count is already ~half of a naive setup. These dims are the main
# knob for inference speed -- smaller hidden / fewer layers => faster decode.
embed_dim: 128
enc_layers: 2
dec_layers: 1
enc_heads: 4
dec_hidden: 128
ffn_dim: 256
dropout: 0.1
lang_embed_dim: 8              # language embedding dimension; 0 disables lang embed
max_langs: 64

# --- training ---
epochs: 80
batch_size: 2048
lr: 1.0e-2
weight_decay: 1.0e-5
grad_clip: 5.0
lr_decay_gamma: 0.8          # decay lr to 80% of previous epoch (1.0 = no decay)
fp16: true
# Group similar-length samples in each batch. Essential so that larger batch
# sizes do NOT get slower (padding stays ~constant instead of exploding with
# batch size). Keep true unless you have a reason to randomise batch membership.
sort_by_length: true                    # group similar-length samples in a batch (stable padding)
device: cuda                   # cuda | cpu
num_workers: 12
log_every: 100
save_every: 10                 # periodic epoch ckpt every N epochs (0 => best+last only)

# --- derived-task design note ---
# separated_graphmes / separated_phonemes / aligned_phonemes are encoded as flat
# *count* sequences (segment lengths) and regrouped from the base graphmes /
# phonemes at inference. No cross-task consistency supervision is used -- the
# encoder is shared and each decoder head is independent.

# --- tensorboard monitoring ---
tensorboard: true                  # enable TensorBoard logging
tb_log_dir: null                   # null -> checkpoints/{model_name}/tb-logs
num_fixed_samples: 5               # fixed val samples tracked every epoch / at each save
fixed_samples_seed: 1337           # deterministic selection of the fixed samples
# log_every also drives the step-granularity (transient) loss curves in TensorBoard

# --- deployment artifact (small: weights only, optional fp16) ---
save_model_only: true             # also write model_best/model_last.pt (no optimizer)
export_dtype: fp16                # dtype of those files: fp32 | fp16 (fp16 ~ halves size)

# --- data residency ---
# Resident on CUDA (num_workers=0): the whole dataset (~286 MB binary, ~0.5 GB as
# int64 on GPU) is uploaded once at start, so training does ZERO disk I/O per step.
# For this 1M-sample / tiny-model setup this is dramatically faster -- the GPU is
# no longer starved by random mmap reads from disk (a batch-2048 epoch drops from
# ~5 h to ~15-20 min). Keep false only if you must minimise VRAM (e.g. a tiny GPU).
data_on_gpu: true
